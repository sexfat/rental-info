    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      color: #fff;
      padding: 24px 16px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;

    }
    header .tag {
      display: inline-block;

      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    header h1 {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      line-height: 1.4;
    }

    /* ── Address card ── */
    .info-card {
      background: #fff;
      margin: 16px;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .info-card .icon {
      font-size: 28px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .info-card .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 4px;
    }
    .info-card .address-text {
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
    }
    .map-btn {
      display: inline-block;
      margin-top: 10px;
      background: #2d6a4f;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      transition: background .2s;
    }
    .map-btn:hover { background: #1b4332; }

    /* ── Section heading ── */
    .section-heading {
      padding: 8px 16px 4px;
      font-size: 13px;
      font-weight: 700;
      color: #2d6a4f;
      letter-spacing: .5px;
    }

    /* ── Gallery grid ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 16px 16px;
    }
    @media (min-width: 600px) {
      .gallery { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 900px) {
      .gallery { grid-template-columns: repeat(4, 1fr); }
    }

    .gallery-item {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }
    .gallery-item img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .gallery-item .img-num {
      text-align: center;
      padding: 5px 4px;
      font-size: 11px;
      color: #888;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 95vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lb-close {
      position: absolute;
      top: 14px;
      right: 18px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      user-select: none;
    }
    .lb-nav {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }
    .lb-nav button {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 20px;
      cursor: pointer;
      transition: background .2s;
    }
    .lb-nav button:hover { background: rgba(255,255,255,.3); }
    .lb-counter {
      color: rgba(255,255,255,.7);
      font-size: 13px;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<script>
  const imgs = [
    "中壢區興北一路200號4樓之二/536a65f13bfb9fa02d3be7011023a5265c5ea9ad.jpg",
    "中壢區興北一路200號4樓之二/S__38715424_0.jpg",

    "中壢區興北一路200號4樓之二/S__38715430_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715431_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715432_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715433_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715434_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715435_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715437_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715438_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715439_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715440_0.jpg",
    "中壢區興北一路200號4樓之二/S__38715441_0.jpg"
  ];
  let cur = 0;

  function openLB(i) {
    cur = i;
    document.getElementById('lb-img').src = imgs[cur];
    document.getElementById('lb-counter').textContent = (cur+1) + ' / ' + imgs.length;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLB() {
    document.getElementById('lightbox').classList.remove('open');
  }
  function nextImg() {
    cur = (cur + 1) % imgs.length;
    document.getElementById('lb-img').src = imgs[cur];
    document.getElementById('lb-counter').textContent = (cur+1) + ' / ' + imgs.length;
  }
  function prevImg() {
    cur = (cur - 1 + imgs.length) % imgs.length;
    document.getElementById('lb-img').src = imgs[cur];
    document.getElementById('lb-counter').textContent = (cur+1) + ' / ' + imgs.length;
  }
  // Close on backdrop click
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLB();
  });
  // Keyboard nav
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowRight') nextImg();
    if (e.key === 'ArrowLeft') prevImg();
    if (e.key === 'Escape') closeLB();
  });
</script>

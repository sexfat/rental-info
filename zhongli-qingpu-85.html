    /* ── Header ── */

      text-align: center;

    header .tag {

      letter-spacing: 1px;

    /* ── Address card ── */

      border-radius: 14px;

      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .info-card .icon {
      font-size: 28px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .info-card .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .8px;
      margin-bottom: 4px;
    }
    .info-card .address-text {
      font-size: clamp(14px, 3.5vw, 17px);
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
    }
    .map-btn {
      display: inline-block;
      margin-top: 10px;
      background: #7b3f00;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      transition: background .2s;
    }
    .map-btn:hover { background: #4e2800; }

    /* ── Section heading ── */
    .section-heading {
      padding: 8px 16px 4px;
      font-size: 13px;
      font-weight: 700;
      color: #7b3f00;
      letter-spacing: .5px;
    }

    /* ── Gallery grid ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 16px 16px;
    }
    @media (min-width: 600px) {
      .gallery { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 900px) {
      .gallery { grid-template-columns: repeat(4, 1fr); }
    }

    .gallery-item {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,.18);
    }
    .gallery-item img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .gallery-item .img-num {
      text-align: center;
      padding: 5px 4px;
      font-size: 11px;
      color: #888;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 95vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lb-close {
      position: absolute;
      top: 14px;
      right: 18px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      user-select: none;
    }
    .lb-nav {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }
    .lb-nav button {
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 20px;
      cursor: pointer;
      transition: background .2s;
    }
    .lb-nav button:hover { background: rgba(255,255,255,.3); }
    .lb-counter {
      color: rgba(255,255,255,.7);
      font-size: 13px;
      margin-top: 10px;
    }

      text-align: center;
      padding: 20px;
      font-size: 12px;

<script>
  const imgs = [
    "zhongli-qingpu-85/654295611_10231486464336899_6441357580831456301_n.jpg",

    "zhongli-qingpu-85/654788211_10231486501337824_1127965192735233897_n.jpg",
    "zhongli-qingpu-85/654794569_10231486508297998_6366076911638378849_n.jpg",
    "zhongli-qingpu-85/654850060_10231486497217721_2993122665449260010_n.jpg",
    "zhongli-qingpu-85/654891028_10231486451416576_4748077049870895589_n.jpg",

    "zhongli-qingpu-85/655323923_10231486479017266_1750848338893128530_n.jpg",
    "zhongli-qingpu-85/655450295_10231486428295998_2904421964019902853_n.jpg",

    "zhongli-qingpu-85/655761636_10231486453376625_7944851989582937843_n.jpg",
    "zhongli-qingpu-85/655890022_10231486415815686_4404966087039765932_n (1).jpg",
    "zhongli-qingpu-85/655890022_10231486415815686_4404966087039765932_n.jpg",
    "zhongli-qingpu-85/655983572_10231486521178320_3873498404004833981_n.jpg",
    "zhongli-qingpu-85/656048381_10231486437016216_3904943082765304152_n.jpg",
    "zhongli-qingpu-85/656775741_10231486508097993_7285333417956833583_n.jpg",
    "zhongli-qingpu-85/657042005_10231486447656482_2945385163588550461_n.jpg",
    "zhongli-qingpu-85/657080321_10231486442336349_8751874793114308719_n.jpg"
  ];
  let cur = 0;

  function openLB(i) {
    cur = i;
    document.getElementById('lb-img').src = imgs[cur];
    document.getElementById('lb-counter').textContent = (cur+1) + ' / ' + imgs.length;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLB() {
    document.getElementById('lightbox').classList.remove('open');
  }
  function nextImg() {
    cur = (cur + 1) % imgs.length;
    document.getElementById('lb-img').src = imgs[cur];
    document.getElementById('lb-counter').textContent = (cur+1) + ' / ' + imgs.length;
  }
  function prevImg() {
    cur = (cur - 1 + imgs.length) % imgs.length;
    document.getElementById('lb-img').src = imgs[cur];
    document.getElementById('lb-counter').textContent = (cur+1) + ' / ' + imgs.length;
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLB();
  });
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowRight') nextImg();
    if (e.key === 'ArrowLeft') prevImg();
    if (e.key === 'Escape') closeLB();
  });
</script>
